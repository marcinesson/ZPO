spring.application.name=weterynarz
spring.datasource.url=jdbc:h2:mem:vetdb
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
# Pokazuje zapytania SQL w konsoli
spring.jpa.show-sql=true
# (Opcjonalnie) Formatuje je, ?eby by?y czytelne, a nie w jednej d?ugiej linii
spring.jpa.properties.hibernate.format_sql=true
# W??cza graficzn? konsol? bazy danych
spring.h2.console.enabled=true
# Ustawia ?cie?k? do konsoli
spring.h2.console.path=/h2-console
